<svg xmlns="http://www.w3.org/2000/svg" width="760" height="238" viewBox="0 0 760 238" role="img" aria-labelledby="title desc">
  <title id="title">Omar's terminal profile</title>
  <desc id="desc">A short terminal session introducing Omar and his current projects.</desc>
  <style>@media (prefers-reduced-motion: reduce) { animate, set { display: none; } }</style>

  <rect x="0.5" y="0.5" width="759" height="237" rx="11.5" fill="#0d1117" stroke="#30363d"/>
  <path d="M12 1h736a11 11 0 0 1 11 11v25H1V12A11 11 0 0 1 12 1Z" fill="#161b22"/>
  <path d="M1 37.5h758" stroke="#30363d"/>

  <circle cx="21" cy="19" r="6" fill="#ff5f57"/>
  <circle cx="43" cy="19" r="6" fill="#febc2e"/>
  <circle cx="65" cy="19" r="6" fill="#28c840"/>
  <text x="380" y="23" text-anchor="middle" fill="#8b949e" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="12">omar — zsh — 80×24</text>

  <g font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace" font-size="14">
