      <text x="67" y="94" fill="#79c0ff">bangkok</text>
      <text x="133" y="94" fill="#c9d1d9">~ %</text>
      <clipPath id="type-whoami">
        <rect x="169" y="78" width="58" height="22">
          <animate attributeName="width" from="0" to="58" begin="0s" dur="0.7s" fill="freeze"/>
