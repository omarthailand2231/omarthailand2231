      </clipPath>
      <text x="169" y="94" fill="#f0f6fc" clip-path="url(#type-whoami)">whoami</text>
    </g>

    <g>
      <set attributeName="opacity" to="0" begin="0s" dur="0.78s"/>
      <text x="22" y="123" fill="#f0f6fc">Omar — frontend developer @ Atomtech</text>
    </g>

    <g>
      <set attributeName="opacity" to="0" begin="0s" dur="0.95s"/>
      <text x="22" y="152" fill="#3fb950">omar</text>
      <text x="58" y="152" fill="#8b949e">@</text>
      <text x="67" y="152" fill="#79c0ff">bangkok</text>
      <text x="133" y="152" fill="#c9d1d9">~ %</text>
      <clipPath id="type-focus">
        <rect x="169" y="136" width="176" height="22">
          <animate attributeName="width" from="0" to="176" begin="0.95s" dur="0.89s" fill="freeze"/>
        </rect>
      </clipPath>
      <text x="169" y="152" fill="#f0f6fc" clip-path="url(#type-focus)">cat current-focus.txt</text>
    </g>

    <g>
      <set attributeName="opacity" to="0" begin="0s" dur="1.92s"/>
      <text x="22" y="181" fill="#d2a8ff">Sol</text>
      <text x="50" y="181" fill="#8b949e">·</text>
      <text x="64" y="181" fill="#79c0ff">Blood AI</text>
      <text x="130" y="181" fill="#8b949e">·</text>
      <text x="144" y="181" fill="#ffa657">autonomous sumo robot</text>
    </g>

    <g>
      <set attributeName="opacity" to="0" begin="0s" dur="2.08s"/>
      <text x="22" y="210" fill="#3fb950">omar</text>
      <text x="58" y="210" fill="#8b949e">@</text>
      <text x="67" y="210" fill="#79c0ff">bangkok</text>
      <text x="133" y="210" fill="#c9d1d9">~ %</text>
      <rect x="169" y="197" width="8" height="16" fill="#c9d1d9">
        <animate attributeName="opacity" values="1;0;1" begin="2.08s" dur="1s" repeatCount="indefinite"/>
