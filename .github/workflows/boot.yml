name: regenerate boot banner

on:
  schedule:
    # Every 10 minutes, offset from the busiest top-of-hour schedule window.
    - cron: "3,13,23,33,43,53 * * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths: ["scripts/generate_boot.py", "scripts/ai_message.py"]

permissions:
  contents: write

concurrency:
  group: boot
  # A stale queued render can no longer race a newer refresh and fail to push.
  cancel-in-progress: true

jobs:
  boot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: generate banners
        env:
          BOARD_AI_KEY: ${{ secrets.BOARD_AI_KEY }}
        run: python3 scripts/generate_boot.py

      - name: commit if changed
        run: |
          git config user.name "boot-daemon"
          git config user.email "actions@github.com"
          git add boot.svg boot-light.svg
          git diff --staged --quiet || git commit -m "boot: refresh status"
          git push
